<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO-APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>Daily To Do List</h1>
          <div class="row">
              <input type="text" id="input-box" placeholder="Add new list item">
              <button onclick="addTask()">Add</button>
          </div>
             <ul id="list-container">
               <!-- <li>Task1 1</li>
               <li>Task 2</li>
               <li>Task 3</li> -->
             </ul>
             <hr>
                <span class="num">items selected</span>
                <a href="" id="clear">clear all</a>
        </div>
         
    </div>
    <script src="script.js"></script>

</body>
</html>
